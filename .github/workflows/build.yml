name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Rust project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install latest stable
        uses: actions-rs/toolchain@v1
        with:
            toolchain: stable
            target: wasm32-unknown-unknown
            override: true
      
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

     - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true

     - name: Generate feeds
       run: deno task wasmbuild new

     # - name: Build Wasm SSR Bundle
     #   run: wasm-pack build --target web --release

      - name: List all # to know what to exlude in deno.json
        run: ls -lah

      - name: Commit and push changes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage ONLY the TypeScript files
          git add *.ts  
          
          # Check if there are any STAGED changes ready to be committed
          if ! git diff --cached --quiet; then
            echo "Changes detected in .ts files. Committing and pushing..."
            git commit -m "chore: auto-format code"
            git push
          else
            echo "No .ts formatting changes detected. Skipping commit."
          fi