name: Build Wasm

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-commit:
    name: Build Rust to Wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Build Wasm
        run: deno task wasmbuild new

      # This step automatically commits the generated files back to your repository
      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: compile rust to wasm [skip ci]"
          add_options: '-f' # This forces git to add the files even if they are in .gitignore
          file_pattern: 'lib/ mod.js .gitignore' # Removed the * to prevent shell expansion issues
