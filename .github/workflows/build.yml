name: Build Wasm

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-commit:
    name: Build Rust to Wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      # --- THE FIX IS HERE ---
      - name: Scaffold Project
        run: deno run -A jsr:@deno/wasmbuild@0.19.0 new

      - name: Build WebAssembly
        run: deno task wasmbuild
      # -----------------------

      - name: Install and Run Tree (Debugging)
        run: |
          sudo apt-get update && sudo apt-get install -y tree
          echo "--- DIRECTORY STRUCTURE ---"
          tree -a -L 3
          echo "--- GIT STATUS ---"
          git status

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: scaffold and compile rust to wasm [skip ci]"
          add_options: '-f'
          # Explicitly target all scaffolded AND generated files
          file_pattern: 'deno.json Cargo.toml .rustfmt.toml .gitignore rs_lib/ lib/ mod.js'
