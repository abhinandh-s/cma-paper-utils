name: Build Wasm

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-commit:
    name: Build Rust to Wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Build Wasm
        run: deno task wasmbuild new

      # --- DEBUGGING STEPS START HERE ---
      - name: Install and Run Tree
        run: |
          sudo apt-get update && sudo apt-get install -y tree
          echo "--- DIRECTORY STRUCTURE ---"
          tree -a -L 3
          echo "--- GIT STATUS ---"
          git status
      # --- DEBUGGING STEPS END HERE ---

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        # Adding continue-on-error temporarily so the workflow doesn't fail 
        # while we are just trying to read the tree output!
        continue-on-error: true 
        with:
          commit_message: "chore: compile rust to wasm [skip ci]"
          add_options: '-f'
          file_pattern: 'lib/ mod.js .gitignore' 
